<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      padding: 16px;
      background: #222;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1ce783;
    }
    .header .logo {
      width: 24px;
      height: 24px;
      background: #1ce783;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: 700;
      font-size: 14px;
    }
    .section {
      padding: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .section:last-child { border-bottom: none; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ok { background: #1ce783; }
    .status-dot.warn { background: #f5a623; }
    .status-text { font-size: 12px; color: #aaa; }
    .feature {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }
    .feature-icon { color: #1ce783; flex-shrink: 0; margin-top: 1px; }
    .feature p { font-size: 12px; color: #aaa; line-height: 1.4; }
    .feature strong { color: #e0e0e0; }
    .settings-link {
      display: block;
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #222;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s ease;
    }
    .settings-link:hover {
      border-color: #1ce783;
      color: #1ce783;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">NR</div>
    <h1>NewRelic Extended</h1>
  </div>

  <div class="section">
    <div class="status-row">
      <span class="status-dot" id="apiStatus"></span>
      <span class="status-text" id="apiStatusText"></span>
    </div>
    <div class="status-row">
      <span class="status-dot" id="accountStatus"></span>
      <span class="status-text" id="accountStatusText"></span>
    </div>
  </div>

  <div class="section">
    <div class="feature">
      <span class="feature-icon">&#10003;</span>
      <p><strong>Copy JSON</strong> &mdash; Hover over JSON results to see a copy button</p>
    </div>
    <div class="feature">
      <span class="feature-icon">&#10003;</span>
      <p><strong>Download Logs</strong> &mdash; Click the green button on New Relic pages to download beyond 5000 limit</p>
    </div>
  </div>

  <div class="section">
    <button class="settings-link" id="openSettings">Open Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
